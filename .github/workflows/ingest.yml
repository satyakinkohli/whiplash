name: ingest

on:
  schedule:
    # 00:30 UTC = 06:00 IST. Daily.
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Run a single source by id (e.g. rsi). Leave blank for all."
        required: false
        type: string
      dry_run:
        description: "Dry run (no DB writes, no email)."
        required: false
        type: boolean
        default: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      DIGEST_FROM_EMAIL: ${{ secrets.DIGEST_FROM_EMAIL }}
      DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
      SONGKICK_API_KEY: ${{ secrets.SONGKICK_API_KEY }}
      BANDSINTOWN_APP_ID: ${{ secrets.BANDSINTOWN_APP_ID }}
      WHIPLASH_USER_AGENT: "whiplash-pipeline (+https://github.com/${{ github.repository }})"
      WHIPLASH_DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run ingestion
        run: |
          if [ -n "${{ inputs.source }}" ]; then
            pnpm tsx src/runner.ts --source "${{ inputs.source }}"
          else
            pnpm tsx src/runner.ts
          fi
